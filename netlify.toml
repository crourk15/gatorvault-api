# GatorVault Insider — Netlify (gatorvaultinsider.com)
# Publishes server/ static vault + FutureCast Next.js export (client/out merged at build).

[build]
  command = "npm run build:netlify"
  publish = "server"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_BASE = "https://gatorvault-api.onrender.com"

# FutureCast React routes — rewrite to static export (200 = serve file, not redirect)
[[redirects]]
  from = "/futurecast/predictions"
  to = "/futurecast/index.html"
  status = 301

[[redirects]]
  from = "/futurecast/player/*"
  to = "/player/:splat"
  status = 301

[[redirects]]
  from = "/futurecast/stock/*"
  to = "/futurecast/stock/index.html"
  status = 200

[[redirects]]
  from = "/futurecast/snapshots/*"
  to = "/futurecast/snapshots/index.html"
  status = 200

[[redirects]]
  from = "/futurecast"
  to = "/futurecast/index.html"
  status = 200

[[redirects]]
  from = "/futurecast/*"
  to = "/futurecast/index.html"
  status = 200

[[redirects]]
  from = "/recruiting-board"
  to = "/recruiting-board/index.html"
  status = 200

[[redirects]]
  from = "/recruiting-board/*"
  to = "/recruiting-board/index.html"
  status = 200

[[redirects]]
  from = "/recruiting"
  to = "/recruiting-board/index.html"
  status = 200

[[redirects]]
  from = "/recruits"
  to = "/recruiting-board/index.html"
  status = 200

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Content-Type = "image/x-icon"
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/og-image.jpg"
  [headers.values]
    Content-Type = "image/jpeg"
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
