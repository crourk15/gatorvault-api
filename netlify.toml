# GatorVault Insider — Netlify (gatorvaultinsider.com)
# Publishes server/ static vault + FutureCast Next.js export (client/out merged at build).

[build]
  command = "npm run build:netlify"
  publish = "server"

[build.environment]
  NODE_VERSION = "20"

# Proxy API through same origin — no external API URLs in the browser
[[redirects]]
  from = "/api/*"
  to = "https://gatorvault-api.onrender.com/api/:splat"
  status = 200
  force = true

# FutureCast React routes — rewrite to static export (200 = serve file, not redirect)
[[redirects]]
  from = "/futurecast/predictions"
  to = "/futurecast/index.html"
  status = 301

[[redirects]]
  from = "/futurecast/player/*"
  to = "/player/:splat"
  status = 301

[[redirects]]
