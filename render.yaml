# GatorVault API — Render Blueprint
# Dashboard: New → Blueprint → connect repo → Deploy Blueprint
# Secrets (sync: false) are prompted in Render; paste values from server/.env
#
# DEPLOYMENT: gatorvault-api on Render auto-deploys from `main` only.
# Use feature/release branches as needed; merge into `main` when ready for production.
# `main` is the single source of truth — Render will redeploy automatically on push.

services:
  - type: web
    name: gatorvault-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/recruiting/ingest/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        value: https://gatorvaultinsider.com
      - key: EMAIL_PROVIDER
        value: emailjs
      - key: ON3_INGEST_ENABLED
        value: "true"
      - key: ON3_INGEST_INTERVAL_MS
        value: "120000"
      - key: ON3_CLASS_YEARS
        value: "2026,2027"
      - key: ON3_INGEST_BOOT_DELAY_MS
        value: "15000"
      - key: RIVALS_PM_INGEST_ENABLED
        value: "true"
      - key: RIVALS_PM_INTERVAL_MS
        value: "300000"
      - key: RIVALS_PM_CLASS_YEARS
        value: "2027,2028,2029"
      - key: RIVALS_PM_BOOT_DELAY_MS
        value: "60000"
      - key: SESSION_SECRET
        generateValue: true
      - key: EMAILJS_USER_ID
        sync: false
      - key: EMAILJS_PRIVATE_KEY
        sync: false
      - key: EMAILJS_SERVICE_ID
        sync: false
      - key: EMAILJS_TEMPLATE_ID
        sync: false
      - key: EMAILJS_REPLY_TO
        sync: false
      - key: RECRUITING_ADMIN_PIN
        sync: false
      - key: OPS_ADMIN_PIN
        sync: false
      - key: EMAIL_TEST_PIN
        sync: false
      - key: X_OAUTH1_API_KEY
        sync: false
      - key: X_OAUTH1_API_SECRET
        sync: false
      - key: X_OAUTH1_ACCESS_TOKEN
        sync: false
      - key: X_OAUTH1_ACCESS_TOKEN_SECRET
        sync: false
      - key: X_AUTOPOST_ENABLED
        value: "true"
      - key: X_AUTOPOST_INTERVAL_MS
        value: "60000"
      - key: X_AUTOPOST_REPLY_ENABLED
        value: "true"
      - key: GNFP_YOUTUBE_CHANNEL_ID
        value: "UC4uzOAHPLPqEnNpNmDUP1VA"
      - key: GV_PRICING_LAUNCH_YEAR
        value: "2026"
      - key: FILM_ROOM_SYNC_ENABLED
        value: "true"
      - key: MEDIA_INGEST_ENABLED
        value: "false"
      - key: MEDIA_INGEST_INTERVAL_MS
        value: "900000"
