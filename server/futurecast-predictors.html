<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Predictor Leaderboard — FutureCast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/futurecast-profile.css">
  <style>
    .fc-leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .fc-leaderboard-table th, .fc-leaderboard-table td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid rgba(0, 48, 135, 0.35); }
    .fc-leaderboard-table th { color: #64748b; font-size: 0.6875rem; text-transform: uppercase; }
    .fc-leaderboard-table td { color: #e2e8f0; }
    .fc-leaderboard-table tr:hover td { background: rgba(0, 48, 135, 0.15); }
    main { max-width: 900px; margin: 0 auto; padding: 1rem; }
    h1 { font-family: Oswald, sans-serif; color: #fff; }
  </style>
</head>
<body class="fc-body">
  <header class="fc-topbar">
    <a href="/futurecast/predictions">← Picks</a>
    <span class="fc-topbar__title">Predictor Leaderboard</span>
    <span class="fc-topbar__spacer"></span>
  </header>
  <main>
    <h1>Predictor Leaderboard</h1>
    <p style="color:#64748b;font-size:0.875rem">Hit rates across FutureCast predictors</p>
    <div id="status" class="fc-profile-empty">Loading…</div>
    <div id="table-wrap"></div>
  </main>
  <script src="/futurecast-predictors.js"></script>
</body>
</html>
