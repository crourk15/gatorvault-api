<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>GatorVault — Admin Hub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/gv-feedback.css?v=2">
  <style>
    *{box-sizing:border-box}
    :root{
      --hub-bg:#030712;--hub-panel:#0b1220;--hub-border:#1e3a5f;--hub-text:#e2e8f0;
      --hub-muted:#94a3b8;--hub-orange:#FA4616;--hub-sidebar:240px;
    }
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--hub-bg);color:var(--hub-text);min-height:100vh}
    .hidden{display:none!important}
    .admin-pin-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px}
    .admin-pin-card{background:var(--hub-panel);border:1px solid var(--hub-border);border-radius:16px;padding:28px;width:100%;max-width:400px}
    .admin-pin-card h1{margin:0 0 6px;font-family:Oswald,sans-serif;color:#fff;font-size:1.35rem;letter-spacing:.04em}
    .admin-pin-card p{color:var(--hub-muted);font-size:14px;margin:0 0 18px;line-height:1.45}
    .admin-pin-card label{display:block;font-size:11px;color:var(--hub-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    .admin-pin-card input{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#111827;color:#f8fafc;font:inherit;margin-bottom:8px}
    .hub-btn{border:0;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;background:var(--hub-orange);color:#fff;font-size:13px;min-height:44px;touch-action:manipulation}
    .hub-btn.secondary{background:#1e3a5f;color:var(--hub-text)}
    .hub-btn:disabled{opacity:.55;cursor:not-allowed}
    .err{color:#f87171;font-size:12px}

    #hub-shell{display:flex;min-height:100vh}
    .hub-sidebar{
      width:var(--hub-sidebar);flex-shrink:0;background:linear-gradient(180deg,#0a1628,#060f1a);
      border-right:2px solid #003087;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
    }
    .hub-brand{padding:18px 16px 14px;border-bottom:1px solid var(--hub-border)}
    .hub-brand h1{margin:0;font-family:Oswald,sans-serif;font-size:1.1rem;color:var(--hub-orange);letter-spacing:.06em}
    .hub-brand p{margin:4px 0 0;font-size:11px;color:var(--hub-muted);line-height:1.35}
    .hub-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:4px}
    .hub-nav-btn{
      display:flex;align-items:center;gap:10px;width:100%;border:none;background:transparent;color:var(--hub-muted);
      padding:10px 12px;border-radius:10px;text-align:left;cursor:pointer;font:inherit;font-size:13px;font-weight:600;
      min-height:44px;-webkit-tap-highlight-color:transparent;
    }
    .hub-nav-btn:hover{background:rgba(0,48,135,.25);color:#e2e8f0}
    .hub-nav-btn.active{background:rgba(250,70,22,.15);color:#fff;border:1px solid rgba(250,70,22,.35)}
    .hub-nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
    .hub-sidebar-foot{padding:12px;border-top:1px solid var(--hub-border);display:flex;flex-direction:column;gap:8px}
    .hub-sidebar-foot a,.hub-sidebar-foot button{font-size:12px;color:var(--hub-muted);text-decoration:none;background:transparent;border:none;text-align:left;padding:8px 12px;cursor:pointer;font:inherit}
    .hub-sidebar-foot a:hover,.hub-sidebar-foot button:hover{color:#fff}

    .hub-main{flex:1;min-width:0;display:flex;flex-direction:column;max-height:100vh}
    .hub-topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;
      border-bottom:1px solid var(--hub-border);background:rgba(3,7,18,.95);backdrop-filter:blur(8px);flex-shrink:0;
    }
    .hub-topbar h2{margin:0;font-family:Oswald,sans-serif;font-size:1.15rem;color:#fff}
    .hub-topbar-actions{display:flex;gap:8px;align-items:center}
    .hub-content{flex:1;overflow:auto;padding:16px 20px 32px;-webkit-overflow-scrolling:touch}
    .hub-section-head{margin-bottom:14px}
    .hub-section-head h2{margin:0 0 4px;font-family:Oswald,sans-serif;font-size:1.25rem;color:#fff}
    .hub-section-head p{margin:0;font-size:13px;color:var(--hub-muted)}

    .hub-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .hub-tab{border:1px solid var(--hub-border);background:var(--hub-panel);color:var(--hub-muted);padding:8px 14px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;font:inherit;min-height:36px}
    .hub-tab.active{background:var(--hub-orange);border-color:var(--hub-orange);color:#fff}

    .hub-panel{min-height:480px}
    .hub-iframe{width:100%;min-height:calc(100vh - 180px);border:1px solid var(--hub-border);border-radius:12px;background:#020617}

    .hub-settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .hub-card{background:var(--hub-panel);border:1px solid var(--hub-border);border-radius:12px;padding:16px}
    .hub-card-wide{grid-column:1/-1}
    .hub-card h3{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--hub-muted)}
    .hub-card label{display:block;font-size:11px;color:var(--hub-muted);margin:10px 0 6px;text-transform:uppercase}
    .hub-card input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #334155;background:#111827;color:#f8fafc;font:inherit;margin-bottom:8px}
    .hub-btn-row{display:flex;flex-wrap:wrap;gap:8px}
    .hub-meta{font-size:12px;color:var(--hub-muted);line-height:1.5;margin:8px 0}
    .hub-meta code{font-size:11px;color:#93c5fd}
    .hub-tier-list{font-size:12px;color:#cbd5e1;padding-left:18px;margin:8px 0 0}
    .hub-log{background:#020617;border:1px solid #1e293b;border-radius:10px;padding:12px;min-height:100px;max-height:220px;overflow:auto;font-family:ui-monospace,monospace;font-size:11px}
    .hub-log .ok{color:#4ade80}.hub-log .err{color:#f87171}.hub-log .info{color:#93c5fd}

    @media(max-width:900px){
      #hub-shell{flex-direction:column}
      .hub-sidebar{width:100%;height:auto;position:relative;border-right:0;border-bottom:2px solid #003087}
      .hub-nav{flex-direction:row;flex-wrap:nowrap;overflow-x:auto;padding:8px}
      .hub-nav-btn{flex:0 0 auto;white-space:nowrap;padding:8px 12px}
      .hub-nav-label{font-size:12px}
      .hub-sidebar-foot{display:none}
      .hub-main{max-height:none}
      .hub-iframe{min-height:70vh}
    }
  </style>
</head>
<body>
  <div id="admin-pin-gate" class="admin-pin-ov" role="dialog" aria-modal="true">
    <div class="admin-pin-card">
      <h1>🐊 GatorVault Admin Hub</h1>
      <p>One login. One control panel. Enter your operator PIN to manage recruiting, team, content, community, GM2, and platform settings.</p>
      <label for="gate-pin">Admin PIN</label>
      <input id="gate-pin" type="password" inputmode="numeric" autocomplete="off" placeholder="Admin PIN">
      <p id="gate-err" class="err hidden">Invalid PIN</p>
      <button type="button" class="hub-btn" id="gate-submit" style="width:100%;margin-top:12px">Unlock Control Panel</button>
    </div>
  </div>

  <div id="hub-shell" class="hidden">
    <aside class="hub-sidebar">
      <div class="hub-brand">
        <h1>GatorVault Admin</h1>
        <p>Unified operations hub</p>
      </div>
      <nav id="hub-nav" class="hub-nav" aria-label="Admin sections"></nav>
      <div class="hub-sidebar-foot">
        <a href="/admin-qa.html" target="_blank" rel="noopener">🛡️ QA Monitor</a>
        <a href="/admin-product-intel.html" target="_blank" rel="noopener">🧠 Product Health</a>
        <a href="/" target="_blank" rel="noopener">↗ Open public site</a>
        <button type="button" id="hub-lock">🔒 Lock &amp; sign out</button>
      </div>
    </aside>
    <div class="hub-main">
      <header class="hub-topbar">
        <h2 id="hub-page-title">Dashboard</h2>
        <div class="hub-topbar-actions">
          <button type="button" class="hub-btn secondary" id="hub-lock-top">Lock</button>
        </div>
      </header>
      <div id="hub-main" class="hub-content"></div>
    </div>
  </div>

  <script src="/js/admin-hub-core.js"></script>
  <script>
    document.getElementById('hub-lock-top').addEventListener('click', function () {
      document.getElementById('hub-lock').click();
    });
  </script>
  <script src="/gv-feedback.js?v=1" defer></script>
</body>
</html>
