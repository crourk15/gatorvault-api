<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FutureCast Picks — FutureCast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/futurecast-profile.css">
  <style>
    .fc-predictions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .fc-prediction-card { display: block; background: linear-gradient(145deg, #0a1628, #121c2e); border: 1px solid rgba(0, 48, 135, 0.45); border-radius: 12px; padding: 1rem; text-decoration: none; color: inherit; }
    .fc-prediction-card:hover { border-color: #fa4616; }
    .fc-prediction-card__head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
    .fc-prediction-card__confidence { font-family: Oswald, sans-serif; font-size: 1.25rem; color: #fa4616; font-weight: 700; }
    .fc-prediction-card__name { font-family: Oswald, sans-serif; color: #fff; margin: 0.35rem 0; font-size: 1.1rem; }
    .fc-prediction-card__meta { color: #94a3b8; font-size: 0.8125rem; margin: 0; }
    .fc-prediction-card__school { color: #e2e8f0; font-weight: 600; margin: 0.5rem 0; }
    .fc-pred-source { display: inline-flex; padding: 0.1rem 0.45rem; border-radius: 9999px; font-size: 0.625rem; font-weight: 700; text-transform: uppercase; }
    .fc-pred-source--model { background: rgba(0, 48, 135, 0.35); color: #93c5fd; }
    .fc-pred-source--staff { background: rgba(250, 70, 22, 0.2); color: #fb923c; }
    .fc-pred-source--fan { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; }
    .fc-pred-source--blended { background: rgba(196, 181, 253, 0.15); color: #c4b5fd; }
    .fc-pred-status { display: inline-block; margin-top: 0.5rem; font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; }
    .fc-pred-status--active { color: #4ade80; }
    .fc-pred-status--hit { color: #38bdf8; }
    .fc-pred-status--miss { color: #f87171; }
    .fc-pred-status--withdrawn { color: #64748b; }
    .fc-prediction-item__bar-wrap { height: 8px; background: rgba(0, 48, 135, 0.3); border-radius: 9999px; overflow: hidden; margin-top: 0.35rem; }
    .fc-prediction-item__bar { height: 100%; background: linear-gradient(90deg, #003087, #fa4616); }
    .fc-toolbar { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0; }
    .fc-toolbar label { display: flex; flex-direction: column; font-size: 0.6875rem; color: #64748b; text-transform: uppercase; }
    .fc-toolbar select { background: #0a1628; border: 1px solid rgba(0, 48, 135, 0.5); color: #e2e8f0; border-radius: 8px; padding: 0.45rem; }
    main { max-width: 1200px; margin: 0 auto; padding: 1rem; }
    h1 { font-family: Oswald, sans-serif; color: #fff; }
  </style>
</head>
<body class="fc-body">
  <header class="fc-topbar">
    <a href="/futurecast/big-board">← Big Board</a>
    <span class="fc-topbar__title">FutureCast Picks</span>
    <a href="/futurecast/predictors" style="color:#94a3b8;font-size:0.8125rem">Leaderboard</a>
  </header>
  <main>
    <h1>FutureCast Picks</h1>
    <p style="color:#64748b;font-size:0.875rem">Commitment predictions with confidence scores</p>
    <div class="fc-toolbar" id="toolbar"></div>
    <div id="status" class="fc-profile-empty">Loading…</div>
    <div id="grid" class="fc-predictions-grid"></div>
  </main>
  <script src="/futurecast-predictions.js"></script>
</body>
</html>
