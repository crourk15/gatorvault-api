<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GatorVault Player Profile</title>
  <meta name="robots" content="noindex">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{'gator-orange':'#FA4616','gator-blue':'#003087','surface-700':'#0b1220','surface-800':'#111827','surface-200':'#94a3b8'}}}};</script>
  <style>
    body{background:#030712;color:#e2e8f0;font-family:Inter,Arial,sans-serif;}
    .rating-badge{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Oswald,Arial,sans-serif;font-weight:700;font-size:1.35rem;border:2px solid;position:relative;}
    .rating-elite{border-color:#fbbf24;color:#fbbf24;background:rgba(251,191,36,.1);}
    .rating-strong{border-color:#FA4616;color:#FA4616;background:rgba(250,70,22,.1);}
    .rating-solid{border-color:#003087;color:#60a5fa;background:rgba(0,48,135,.2);}
    .override-pill{position:absolute;top:-6px;right:-12px;font-size:.55rem;font-weight:700;background:#854d0e;color:#fef08a;padding:2px 6px;border-radius:999px;}
    .meas-card{background:#111827;border:1px solid rgba(0,48,135,.25);border-radius:.75rem;padding:.75rem 1rem;}
    .meas-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:#64748b;}
    .meas-value{font-weight:600;color:#fff;margin-top:.15rem;}
    .headshot{width:96px;height:96px;border-radius:50%;object-fit:cover;border:2px solid rgba(250,70,22,.35);background:#0a1628;}
    .headshot-fallback{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.5rem;background:#0a1628;border:2px solid rgba(0,48,135,.35);color:#FA4616;}
    .war-room-panel{background:#111827;border:1px solid rgba(250,70,22,.35);border-radius:1rem;padding:1.25rem;margin-top:1.5rem;}
    .war-room-panel h2{font-weight:700;font-size:1.1rem;color:#fff;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;}
    .war-room-lock{text-align:center;padding:1.5rem 1rem;}
    .war-room-lock p{color:#94a3b8;font-size:.875rem;margin:.5rem 0 1rem;}
    .war-room-empty{color:#94a3b8;font-size:.875rem;font-style:italic;padding:.5rem 0;}
    .war-section{margin-top:1rem;}
    .war-section h3{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#FA4616;margin-bottom:.35rem;font-weight:700;}
    .war-section p,.war-section li{font-size:.875rem;color:#e2e8f0;line-height:1.55;}
    .war-section ul{margin:.25rem 0 0 1rem;padding:0;list-style:disc;}
    .war-sources{font-size:.7rem;color:#64748b;margin-top:1rem;padding-top:.75rem;border-top:1px solid rgba(0,48,135,.25);}
    .war-upgrade{display:inline-block;background:#FA4616;color:#fff;font-weight:700;font-size:.75rem;padding:.5rem 1rem;border-radius:.5rem;text-decoration:none;}
  </style>
  <meta name="gv-build" content="d8e2a41b" />
  <style>:root{--gv-ticker-h:44px}#gv-site-ticker{z-index:500!important;position:fixed;top:0;left:0;right:0;height:44px}#gv-alert-banner{z-index:510!important;position:fixed;top:0;left:0;right:0}body.gv-has-site-ticker{padding-top:var(--gv-ticker-h)}body.gv-has-site-ticker .gv-alert-banner{top:var(--gv-ticker-h)}</style>
  <link rel="stylesheet" href="/gv-global.css?v=d8e2a41b">
  <link rel="stylesheet" href="/gv-feedback.css?v=1">
  <script src="/gv-global.js?v=d8e2a41b" defer></script>
  <script src="/gv-feedback.js?v=1" defer></script>
</head>
<body class="min-h-screen gv-has-site-ticker">
  <div id="gv-site-ticker" class="gv-site-ticker" aria-live="polite" aria-label="Live GatorVault feed">
    <div class="gv-site-ticker-label"><span class="gv-site-ticker-dot" aria-hidden="true"></span>LIVE</div>
    <div class="gv-site-ticker-viewport">
      <div id="gv-site-ticker-track" class="gv-site-ticker-track"></div>
    </div>
  </div>
  <div id="gv-alert-banner" class="gv-alert-banner" role="alert" aria-live="assertive">
    <div class="gv-alert-banner-inner">
      <span id="gv-alert-banner-icon" class="gv-alert-banner-icon">🔔</span>
      <div class="gv-alert-banner-text">
        <div id="gv-alert-banner-title" class="gv-alert-banner-title"></div>
        <div id="gv-alert-banner-body" class="gv-alert-banner-body"></div>
      </div>
      <button type="button" id="gv-alert-banner-close" class="gv-alert-banner-close" aria-label="Dismiss alert">✕</button>
    </div>
  </div>
  <div class="max-w-3xl mx-auto px-4 py-8">
    <a href="/players" id="back-link" class="text-sm text-blue-400 hover:text-blue-300">← Back to Players</a>
    <div id="loading" class="mt-8 text-surface-200">Loading profile…</div>
    <div id="error" class="mt-8 text-red-400 hidden"></div>
    <div id="profile" class="hidden mt-6 space-y-6">
      <div class="bg-surface-700 border border-gator-blue/30 rounded-2xl p-6">
        <div class="flex flex-wrap gap-5 items-start">
          <div id="p-headshot-wrap"></div>
          <div class="flex-1 min-w-[200px] w-full">
            <h1 id="p-name" class="font-bold text-3xl text-white"></h1>
            <p id="p-meta" class="text-gator-orange font-semibold mt-1"></p>
            <p id="p-stars" class="text-yellow-400 text-sm mt-2 tracking-wider"></p>
            <div class="flex items-center gap-3 mt-3">
              <div id="p-rating" class="rating-badge rating-solid"></div>
              <p id="p-rating-note" class="text-xs text-surface-200/70"></p>
            </div>
            <p id="p-injury" class="text-sm mt-3 font-semibold text-green-400"></p>
          </div>
        </div>
        <div id="p-meas" class="grid grid-cols-2 md:grid-cols-3 gap-3 mt-6"></div>
        <p id="p-bio" class="text-white text-sm leading-relaxed border-l-4 border-gator-orange pl-4 mt-6"></p>
        <p id="p-scheme" class="text-surface-200 text-sm mt-4 hidden"></p>
        <p id="p-commit" class="text-xs text-surface-200/60 mt-3 hidden"></p>
        <p id="p-stats" class="text-surface-200 text-xs mt-3 hidden"></p>
        <div id="p-links" class="flex flex-wrap gap-2 mt-5"></div>
      </div>
      <div id="p-recruit-block" class="bg-surface-700 border border-gator-blue/20 rounded-2xl p-6 hidden">
        <h2 class="font-bold text-white mb-3">Recruiting timeline</h2>
        <div id="p-events" class="space-y-3 text-sm"></div>
      </div>
      <div id="p-war-room" class="war-room-panel">
        <h2>War Room Scouting Report</h2>
        <div id="p-war-room-body"><p class="war-room-empty">Loading…</p></div>
      </div>
    </div>
  </div>
  <script>
    var API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:3000' : 'https://gatorvault-api.onrender.com';
    var slug = (location.pathname.match(/\/player\/([^/]+)/) || [])[1] || new URLSearchParams(location.search).get('slug') || '';

    document.getElementById('back-link').addEventListener('click', function (e) {
      e.preventDefault();
      var fromPlayers = document.referrer && (
        document.referrer.indexOf('tab=players') >= 0 ||
        document.referrer.replace(/\/$/, '').endsWith('/players')
      );
      if (fromPlayers) history.back();
      else location.href = '/players';
    });

    function initials(name) {
      var parts = String(name || '').replace(/\s+(Jr\.|Sr\.|III|II|IV)$/i, '').trim().split(/\s+/);
      if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
      return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    function stars(n) {
      var s = '';
      for (var i = 0; i < (n || 0); i++) s += '★';
      return s || '';
    }

    function ratingTier(r) {
      if (r >= 90) return 'rating-elite';
      if (r >= 85) return 'rating-strong';
      return 'rating-solid';
    }

    function headshotHtml(slug, name, url) {
      var src = url || ('/headshots/' + slug + '.svg');
      return '<img class="headshot" src="' + src + '" alt="" onerror="this.outerHTML=\'<div class=\\\'headshot-fallback\\\'>' + initials(name) + '</div>\'">';
    }

    function healthMeta(inj) {
      if (inj === 'yellow') return { dot: '🟡', label: 'Limited', cls: 'text-yellow-400' };
      if (inj === 'red') return { dot: '🔴', label: 'Out', cls: 'text-red-400' };
      return { dot: '🟢', label: 'Healthy', cls: 'text-green-400' };
    }

    function depthTierLabel(tier) {
      if (!tier) return '';
      var map = { starter: 'Starter', rotation: 'Rotation', developmental: 'Developmental' };
      return map[tier] || tier;
    }

    function isFollowed(name) {
      try {
        var prefs = JSON.parse(localStorage.getItem('gv_alertPrefs') || '{}');
        return (prefs.followPlayers || []).indexOf(name) !== -1;
      } catch (e) { return false; }
    }

    function toggleFollow(name) {
      try {
        var prefs = JSON.parse(localStorage.getItem('gv_alertPrefs') || '{}');
        prefs.followPlayers = prefs.followPlayers || [];
        var idx = prefs.followPlayers.indexOf(name);
        if (idx === -1) prefs.followPlayers.push(name);
        else prefs.followPlayers.splice(idx, 1);
        localStorage.setItem('gv_alertPrefs', JSON.stringify(prefs));
      } catch (e) {}
    }

    function loadSession() {
      try {
        return JSON.parse(localStorage.getItem('gv_session') || 'null');
      } catch (e) {
        return null;
      }
    }

    function authHeaders() {
      var h = {};
      var s = loadSession();
      if (s && s.token) h['Authorization'] = 'Bearer ' + s.token;
      return h;
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function warSection(title, content, isList) {
      if (!content || (Array.isArray(content) && !content.length)) return '';
      var body = isList
        ? '<ul>' + content.map(function (x) { return '<li>' + escHtml(x) + '</li>'; }).join('') + '</ul>'
        : '<p>' + escHtml(content) + '</p>';
      return '<div class="war-section"><h3>' + escHtml(title) + '</h3>' + body + '</div>';
    }

    function renderWarRoomPanel(data) {
      var panel = document.getElementById('p-war-room');
      var body = document.getElementById('p-war-room-body');
      if (!panel || !body) return;
      panel.classList.remove('hidden');

      if (data.locked) {
        body.innerHTML = '<div class="war-room-lock">'
          + '<div style="font-size:2rem;margin-bottom:.5rem">🔒</div>'
          + '<p>Verified insider scouting from Power, Bender, Ivins, Alderman, and Wiltfong. Exclusive to War Room.</p>'
          + '<a class="war-upgrade" href="/?upgrade=war">Upgrade to War Room →</a>'
          + '</div>';
        return;
      }

      if (!data.available || !data.breakdown) {
        body.innerHTML = '<p class="war-room-empty">' + escHtml(data.message || 'No verified insider evaluation available.') + '</p>';
        return;
      }

      var b = data.breakdown;
      var html = ''
        + warSection('Strengths', b.strengths, true)
        + warSection('Weaknesses', b.weaknesses, true)
        + warSection('Player comparison', b.comparison)
        + warSection('Scheme fit', b.schemeFit)
        + warSection('Staff evaluation', b.staffNotes)
        + warSection('Projection (2–3 years)', b.projection)
        + warSection('Insider notes', b.insiderNotes)
        + warSection('Recruiting story', b.recruitingStory)
        + warSection('NFL projection', b.nflProjection);

      if (!html) {
        body.innerHTML = '<p class="war-room-empty">No verified insider evaluation available.</p>';
        return;
      }

      if (b.sources && b.sources.length) {
        html += '<div class="war-sources">Sources: '
          + b.sources.map(function (s) {
            var label = escHtml(s.writer) + (s.outlet ? ' · ' + escHtml(s.outlet) : '');
            if (s.url) return '<a href="' + escHtml(s.url) + '" target="_blank" rel="noopener noreferrer" style="color:#60a5fa">' + label + '</a>';
            return label;
          }).join(' · ')
          + '</div>';
      }
      body.innerHTML = html;
    }

    function loadWarRoomBreakdown(slug) {
      if (!slug) return;
      function fetchBreakdown() {
        return fetch(API + '/api/war-room/breakdown/' + encodeURIComponent(slug), { headers: authHeaders() })
          .then(function (r) { return r.json(); })
          .then(renderWarRoomPanel)
          .catch(function () {
            renderWarRoomPanel({ locked: false, available: false, message: 'No verified insider evaluation available.' });
          });
      }
      var s = loadSession();
      if (s && s.email && (!s.token || String(s.token).startsWith('ni-') || !String(s.token).includes('.'))) {
        fetch(API + '/api/auth/bridge-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: s.email, tier: s.tier || 'film', name: s.name || '' })
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.ok && data.session) {
              try { localStorage.setItem('gv_session', JSON.stringify(Object.assign({}, s, data.session))); } catch (e) {}
            }
            fetchBreakdown();
          })
          .catch(fetchBreakdown);
        return;
      }
      fetchBreakdown();
    }

    function on3Url(p) {
      if (p.on3ProfileUrl || p.on3_profile_url) return p.on3ProfileUrl || p.on3_profile_url;
      var on3Slug = p.on3Slug || p.on3_slug;
      if (on3Slug) return 'https://www.on3.com/rivals/' + String(on3Slug).replace(/^\//, '').replace(/\/$/, '') + '/';
      if (p.on3Id || p.on3_id) {
        var id = String(p.on3Id || p.on3_id);
        var base = (p.slug || slug).replace(/-\d+$/, '');
        return 'https://www.on3.com/rivals/' + base + '-' + id + '/';
      }
      if (p.category === 'portal') return 'https://www.on3.com/college/florida-gators/football/2026/commits/';
      return 'https://www.on3.com/college/florida-gators/recruiting/';
    }

    function portalStatusLabel(s) {
      var st = String(s || 'enrolled').toLowerCase();
      if (st === 'enrolled') return 'Enrolled at Florida';
      if (st === 'committed') return 'Committed to Florida';
      if (st === 'portal_in') return 'In Transfer Portal';
      return st.charAt(0).toUpperCase() + st.slice(1);
    }

    function recruitStatusLabel(p) {
      var st = String(p.status || '').toLowerCase();
      var to = String(p.committedTo || '').trim();
      if (st === 'committed' && /^florida$/i.test(to)) return 'Committed to Florida';
      if (to && !/^florida$/i.test(to)) return 'Uncommitted · ' + to + ' commit';
      return 'Uncommitted';
    }

    function renderPortal(p, events) {
      document.title = p.name + ' — Portal Transfer · GatorVault';
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('profile').classList.remove('hidden');
      document.getElementById('p-headshot-wrap').innerHTML = headshotHtml(p.slug || slug, p.name);
      document.getElementById('p-name').textContent = p.name;
      document.getElementById('p-meta').textContent = ['🔄 Portal Transfer', p.pos, stars(p.stars)].filter(Boolean).join(' · ');
      document.getElementById('p-stars').textContent = (p.fromSchool ? 'From ' + p.fromSchool : '')
        + (p.committedTo ? ' · To ' + p.committedTo : ' · To Florida');
      document.getElementById('p-rating').textContent = 'On3';
      document.getElementById('p-rating').className = 'rating-badge rating-solid text-xs';
      document.getElementById('p-rating-note').textContent = 'Transfer portal profile';
      document.getElementById('p-injury').textContent = '';
      document.getElementById('p-meas').innerHTML = ''
        + '<div class="meas-card"><div class="meas-label">Previous School</div><div class="meas-value">' + (p.fromSchool || p.school || '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Ht / Wt</div><div class="meas-value">' + (p.htWt || '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Position</div><div class="meas-value">' + (p.pos || '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Stars</div><div class="meas-value">' + (stars(p.stars) || '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Status</div><div class="meas-value">' + portalStatusLabel(p.status) + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Source</div><div class="meas-value">On3</div></div>';
      document.getElementById('p-bio').textContent = p.skinny || 'On3 transfer portal addition for Florida.';
      document.getElementById('p-scheme').classList.add('hidden');
      document.getElementById('p-recruit-block').classList.remove('hidden');
      document.querySelector('#p-recruit-block h2').textContent = 'Portal timeline';
      var evEl = document.getElementById('p-events');
      if (!events || !events.length) {
        evEl.innerHTML = '<p class="text-surface-200/60">Portal enrollment tracked via On3.</p>';
      } else {
        evEl.innerHTML = events.map(function (e) {
          return '<div class="bg-surface-800 rounded-lg p-3"><div class="font-semibold text-white">' + e.title + '</div>'
            + '<div class="text-xs text-surface-200/60 mt-1">' + new Date(e.createdAt).toLocaleString() + '</div>'
            + (e.skinny ? '<div class="text-surface-200 mt-2">' + e.skinny + '</div>' : '') + '</div>';
        }).join('');
      }
      document.getElementById('p-links').innerHTML = ''
        + '<a href="' + on3Url(p) + '" target="_blank" rel="noopener noreferrer" class="text-xs font-bold px-4 py-2 rounded-lg bg-surface-800 text-surface-200 border border-gator-blue/20">On3 Profile →</a>'
        + '<a href="/?open=vault&tab=portal" class="text-xs font-bold px-4 py-2 rounded-lg bg-gator-orange text-white">Portal Radar →</a>';
      loadWarRoomBreakdown(p.slug || slug);
    }

    function renderRoster(p) {
      document.title = p.name + ' — GatorVault Roster';
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('profile').classList.remove('hidden');
      document.getElementById('p-headshot-wrap').innerHTML = headshotHtml(p.slug || slug, p.name, p.headshotUrl);
      document.getElementById('p-name').textContent = p.name;
      var cls = p.year || p.class || '';
      document.getElementById('p-meta').textContent = [p.pos, cls].filter(Boolean).join(' · ');
      document.getElementById('p-stars').textContent = stars(p.stars) + (p.rank ? '  ·  #' + p.rank + ' rank' : '');
      var rating = p.displayRating != null ? p.displayRating : p.rating;
      var el = document.getElementById('p-rating');
      el.textContent = rating != null ? rating : '—';
      el.className = 'rating-badge ' + ratingTier(rating || 0);
      if (p.ratingIsOverride || (p.ratingOverride != null && p.ratingOverride !== '')) {
        el.innerHTML = rating + '<span class="override-pill">OVR</span>';
      }
      document.getElementById('p-rating-note').textContent = 'Vault Rating (0–100 scale)';
      var inj = healthMeta(p.injury || 'green');
      var injEl = document.getElementById('p-injury');
      injEl.className = 'text-sm mt-3 font-semibold ' + inj.cls;
      injEl.textContent = inj.dot + ' ' + inj.label;
      var meas = [
        ['Jersey', p.jersey ? '#' + p.jersey : ''],
        ['Height', p.height],
        ['Weight', p.weight ? p.weight + ' lbs' : ''],
        ['Hometown', p.hometown],
        ['Depth Chart', depthTierLabel(p.depthChartTier)],
        ['Stars', p.stars ? stars(p.stars) : '']
      ].filter(function (m) { return m[1]; });
      document.getElementById('p-meas').innerHTML = meas.map(function (m) {
        return '<div class="meas-card"><div class="meas-label">' + m[0] + '</div><div class="meas-value">' + escHtml(String(m[1])) + '</div></div>';
      }).join('');
      if (p.transferInfo) {
        document.getElementById('p-scheme').textContent = p.transferInfo;
        document.getElementById('p-scheme').classList.remove('hidden');
      } else {
        document.getElementById('p-scheme').classList.add('hidden');
      }
      document.getElementById('p-bio').textContent = p.stats || p.bio || 'GatorVault roster profile.';
      if (p.bio && p.stats && p.bio !== p.stats) {
        document.getElementById('p-stats').textContent = p.bio;
        document.getElementById('p-stats').classList.remove('hidden');
      } else {
        document.getElementById('p-stats').classList.add('hidden');
      }
      var followed = isFollowed(p.name);
      document.getElementById('p-links').innerHTML = ''
        + '<button type="button" id="p-follow-btn" class="text-xs font-bold px-4 py-2 rounded-lg ' + (followed ? 'bg-gator-orange text-white' : 'bg-surface-800 text-surface-200 border border-gator-blue/20') + '">' + (followed ? 'Following' : 'Follow') + '</button>'
        + '<a href="/players" class="text-xs font-bold px-4 py-2 rounded-lg bg-surface-800 text-surface-200 border border-gator-blue/20">← All Players</a>';
      var followBtn = document.getElementById('p-follow-btn');
      if (followBtn) {
        followBtn.addEventListener('click', function () {
          toggleFollow(p.name);
          renderRoster(p);
        });
      }
      document.getElementById('p-war-room').classList.remove('hidden');
      loadWarRoomBreakdown(p.slug || slug);
    }

    function renderRecruit(p, events) {
      document.title = p.name + ' — GatorVault';
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('profile').classList.remove('hidden');
      document.getElementById('p-headshot-wrap').innerHTML = headshotHtml(p.slug || slug, p.name);
      document.getElementById('p-name').textContent = p.name;
      document.getElementById('p-meta').textContent = [p.pos, p.classYear ? 'Class of ' + p.classYear : '', stars(p.stars)].filter(Boolean).join(' · ');
      document.getElementById('p-stars').textContent = (p.natlRank ? 'Natl #' + p.natlRank : '')
        + (p.posRank ? ' · Pos #' + p.posRank : '')
        + (p.stateRank ? ' · St #' + p.stateRank : '');
      document.getElementById('p-rating').textContent = p.rating != null ? Number(p.rating).toFixed(1) : '—';
      document.getElementById('p-rating-note').textContent = 'On3 composite rating';
      document.getElementById('p-injury').textContent = '';
      document.getElementById('p-meas').innerHTML = ''
        + '<div class="meas-card"><div class="meas-label">School</div><div class="meas-value">' + (p.school || '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Ht / Wt</div><div class="meas-value">' + (p.htWt || '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Natl Rank</div><div class="meas-value">' + (p.natlRank != null ? '#' + p.natlRank : '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Pos Rank</div><div class="meas-value">' + (p.posRank != null ? '#' + p.posRank : '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">State Rank</div><div class="meas-value">' + (p.stateRank != null ? '#' + p.stateRank : '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Status</div><div class="meas-value">' + recruitStatusLabel(p) + '</div></div>';
      document.getElementById('p-bio').textContent = p.skinny || p.profileNote || 'GatorVault recruit profile.';
      document.getElementById('p-scheme').classList.add('hidden');
      if (p.commitDate) {
        var cEl = document.getElementById('p-commit');
        cEl.textContent = 'Committed: ' + p.commitDate + (p.committedTo ? ' to ' + p.committedTo : '');
        cEl.classList.remove('hidden');
      }
      document.getElementById('p-recruit-block').classList.remove('hidden');
      var evEl = document.getElementById('p-events');
      if (!events || !events.length) {
        evEl.innerHTML = '<p class="text-surface-200/60">No events yet.</p>';
      } else {
        evEl.innerHTML = events.map(function (e) {
          return '<div class="bg-surface-800 rounded-lg p-3"><div class="font-semibold text-white">' + e.title + '</div>'
            + '<div class="text-xs text-surface-200/60 mt-1">' + new Date(e.createdAt).toLocaleString() + '</div>'
            + (e.skinny ? '<div class="text-surface-200 mt-2">' + e.skinny + '</div>' : '') + '</div>';
        }).join('');
      }
      document.getElementById('p-links').innerHTML = ''
        + '<a href="' + on3Url(p) + '" target="_blank" rel="noopener noreferrer" class="text-xs font-bold px-4 py-2 rounded-lg bg-surface-800 text-surface-200 border border-gator-blue/20">On3 Profile →</a>'
        + '<a href="/?open=vault&tab=recruit" class="text-xs font-bold px-4 py-2 rounded-lg bg-gator-orange text-white">Recruiting Board →</a>';
      loadWarRoomBreakdown(p.slug || slug);
    }

    async function load() {
      if (!slug) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error').textContent = 'No player slug in URL. Example: /player/ellis-mcgaskin';
        return;
      }
      try {
        var rr = await fetch(API + '/api/roster/players/' + encodeURIComponent(slug));
        if (rr.ok) {
          var roster = await rr.json();
          if (roster.ok && roster.player) {
            renderRoster(roster.player);
            return;
          }
        }
        var r = await fetch(API + '/api/players/' + encodeURIComponent(slug));
        var data = await r.json();
        if (!data.ok || !data.player) throw new Error(data.error || 'Player not found');
        if (data.player.category === 'portal') renderPortal(data.player, data.events);
        else renderRecruit(data.player, data.events);
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error').textContent = e.message || String(e);
      }
    }
    load();
  </script>
</body>
</html>
