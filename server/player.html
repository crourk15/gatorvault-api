<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GatorVault Player Profile</title>
  <meta name="robots" content="noindex">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{'gator-orange':'#FA4616','gator-blue':'#003087','surface-700':'#0b1220','surface-800':'#111827','surface-200':'#94a3b8'}}}};</script>
  <style>
    body{background:#030712;color:#e2e8f0;font-family:Inter,Arial,sans-serif;}
    .headshot{width:140px;height:140px;border-radius:1rem;object-fit:cover;border:2px solid rgba(0,48,135,.5);background:#060f1f;}
    .headshot-fb{width:140px;height:140px;border-radius:1rem;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#001a4d,#003087);border:2px solid rgba(250,70,22,.35);color:#FA4616;font-family:Oswald,Arial,sans-serif;font-size:2.5rem;font-weight:700;}
    .rating-badge{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Oswald,Arial,sans-serif;font-weight:700;font-size:1.35rem;border:2px solid;position:relative;}
    .rating-elite{border-color:#fbbf24;color:#fbbf24;background:rgba(251,191,36,.1);}
    .rating-strong{border-color:#FA4616;color:#FA4616;background:rgba(250,70,22,.1);}
    .rating-solid{border-color:#003087;color:#60a5fa;background:rgba(0,48,135,.2);}
    .override-pill{position:absolute;top:-6px;right:-12px;font-size:.55rem;font-weight:700;background:#854d0e;color:#fef08a;padding:2px 6px;border-radius:999px;}
    .meas-card{background:#111827;border:1px solid rgba(0,48,135,.25);border-radius:.75rem;padding:.75rem 1rem;}
    .meas-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:#64748b;}
    .meas-value{font-weight:600;color:#fff;margin-top:.15rem;}
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-3xl mx-auto px-4 py-8">
    <a href="/" class="text-sm text-blue-400 hover:text-blue-300">← Back to GatorVault</a>
    <div id="loading" class="mt-8 text-surface-200">Loading profile…</div>
    <div id="error" class="mt-8 text-red-400 hidden"></div>
    <div id="profile" class="hidden mt-6 space-y-6">
      <div class="bg-surface-700 border border-gator-blue/30 rounded-2xl p-6">
        <div class="flex flex-wrap gap-5 items-start">
          <div id="p-headshot-wrap"></div>
          <div class="flex-1 min-w-[200px]">
            <h1 id="p-name" class="font-bold text-3xl text-white"></h1>
            <p id="p-meta" class="text-gator-orange font-semibold mt-1"></p>
            <p id="p-stars" class="text-yellow-400 text-sm mt-2 tracking-wider"></p>
            <div class="flex items-center gap-3 mt-3">
              <div id="p-rating" class="rating-badge rating-solid"></div>
              <p id="p-rating-note" class="text-xs text-surface-200/70"></p>
            </div>
            <p id="p-injury" class="text-sm mt-3 font-semibold text-green-400"></p>
          </div>
        </div>
        <div id="p-meas" class="grid grid-cols-2 md:grid-cols-3 gap-3 mt-6"></div>
        <p id="p-bio" class="text-white text-sm leading-relaxed border-l-4 border-gator-orange pl-4 mt-6"></p>
        <p id="p-stats" class="text-surface-200 text-xs mt-3 hidden"></p>
      </div>
      <div id="p-recruit-block" class="bg-surface-700 border border-gator-blue/20 rounded-2xl p-6 hidden">
        <h2 class="font-bold text-white mb-3">Recruiting timeline</h2>
        <div id="p-events" class="space-y-3 text-sm"></div>
      </div>
    </div>
  </div>
  <script>
    var API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:3000' : 'https://gatorvault-api.onrender.com';
    var slug = (location.pathname.match(/\/player\/([^/]+)/) || [])[1] || new URLSearchParams(location.search).get('slug') || '';

    function initials(name) {
      var parts = String(name || '').replace(/\s+(Jr\.|Sr\.|III|II|IV)$/i, '').trim().split(/\s+/);
      if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
      return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    function stars(n) {
      var s = '';
      for (var i = 0; i < (n || 0); i++) s += '★';
      return s || '';
    }

    function ratingTier(r) {
      if (r >= 90) return 'rating-elite';
      if (r >= 85) return 'rating-strong';
      return 'rating-solid';
    }

    function headshotSrc(url) {
      if (!url) return '';
      if (/^https?:\/\//i.test(url) || String(url).indexOf('data:') === 0) return String(url);
      var path = String(url).trim();
      if (path.charAt(0) !== '/') path = '/headshots/' + path;
      return path;
    }

    function headshotHtml(p) {
      var src = headshotSrc(p.headshotUrl);
      if (src && p.hasHeadshot !== false) {
        return '<img src="' + src + '" alt="" class="headshot" onerror="this.outerHTML=\'<div class=headshot-fb>' + initials(p.name) + '</div>\'">';
      }
      return '<div class="headshot-fb">' + initials(p.name) + '</div>';
    }

    function renderRoster(p) {
      document.title = p.name + ' — GatorVault Roster';
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('profile').classList.remove('hidden');
      document.getElementById('p-headshot-wrap').innerHTML = headshotHtml(p);
      document.getElementById('p-name').textContent = p.name;
      document.getElementById('p-meta').textContent = [p.pos, p.year || p.class].filter(Boolean).join(' · ');
      document.getElementById('p-stars').textContent = stars(p.stars) + (p.rank ? '  ·  #' + p.rank + ' rank' : '');
      var rating = p.displayRating != null ? p.displayRating : p.rating;
      var el = document.getElementById('p-rating');
      el.textContent = rating != null ? rating : '—';
      el.className = 'rating-badge ' + ratingTier(rating || 0);
      if (p.ratingIsOverride || (p.ratingOverride != null && p.ratingOverride !== '')) {
        el.innerHTML = rating + '<span class="override-pill">OVR</span>';
      }
      document.getElementById('p-rating-note').textContent = (p.ratingIsOverride ? 'Manual vault override' : 'Vault rating')
        + (p.rating != null && !p.ratingIsOverride ? ' · base ' + p.rating : '');
      var inj = p.injury === 'yellow' ? ['🟡', 'Questionable', 'text-yellow-400'] : p.injury === 'red' ? ['🔴', 'Out', 'text-red-400'] : ['🟢', 'Healthy', 'text-green-400'];
      var injEl = document.getElementById('p-injury');
      injEl.className = 'text-sm mt-3 font-semibold ' + inj[2];
      injEl.textContent = inj[0] + ' ' + inj[1];
      var meas = [
        ['Position', p.pos],
        ['Class', p.year || p.class],
        ['Height', p.height],
        ['Weight', p.weight ? p.weight + ' lbs' : ''],
        ['Hometown', p.hometown],
        ['Stars', p.stars ? stars(p.stars) : '']
      ].filter(function (m) { return m[1]; });
      document.getElementById('p-meas').innerHTML = meas.map(function (m) {
        return '<div class="meas-card"><div class="meas-label">' + m[0] + '</div><div class="meas-value">' + m[1] + '</div></div>';
      }).join('');
      document.getElementById('p-bio').textContent = p.bio || p.stats || 'GatorVault roster profile.';
      if (p.stats && p.bio) {
        document.getElementById('p-stats').textContent = p.stats;
        document.getElementById('p-stats').classList.remove('hidden');
      }
    }

    function renderRecruit(p, events) {
      document.title = p.name + ' — GatorVault';
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('profile').classList.remove('hidden');
      document.getElementById('p-headshot-wrap').innerHTML = '<div class="headshot-fb">' + initials(p.name) + '</div>';
      document.getElementById('p-name').textContent = p.name;
      document.getElementById('p-meta').textContent = [p.pos, p.classYear ? 'Class of ' + p.classYear : '', stars(p.stars)].filter(Boolean).join(' · ');
      document.getElementById('p-stars').textContent = '';
      document.getElementById('p-rating').textContent = p.rating != null ? Number(p.rating).toFixed(1) : '—';
      document.getElementById('p-rating-note').textContent = 'Recruiting composite';
      document.getElementById('p-injury').textContent = '';
      document.getElementById('p-meas').innerHTML = '<div class="meas-card"><div class="meas-label">School</div><div class="meas-value">' + (p.school || '—') + '</div></div>'
        + '<div class="meas-card"><div class="meas-label">Ht / Wt</div><div class="meas-value">' + (p.htWt || '—') + '</div></div>';
      document.getElementById('p-bio').textContent = p.skinny || p.profileNote || 'GatorVault recruit profile.';
      document.getElementById('p-recruit-block').classList.remove('hidden');
      var evEl = document.getElementById('p-events');
      if (!events || !events.length) {
        evEl.innerHTML = '<p class="text-surface-200/60">No events yet.</p>';
      } else {
        evEl.innerHTML = events.map(function (e) {
          return '<div class="bg-surface-800 rounded-lg p-3"><div class="font-semibold text-white">' + e.title + '</div>'
            + '<div class="text-xs text-surface-200/60 mt-1">' + new Date(e.createdAt).toLocaleString() + '</div>'
            + (e.skinny ? '<div class="text-surface-200 mt-2">' + e.skinny + '</div>' : '') + '</div>';
        }).join('');
      }
    }

    async function load() {
      if (!slug) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error').textContent = 'No player slug in URL. Example: /player/vernell-brown-iii';
        return;
      }
      try {
        var rr = await fetch(API + '/api/roster/players/' + encodeURIComponent(slug));
        if (rr.ok) {
          var roster = await rr.json();
          if (roster.ok && roster.player) {
            renderRoster(roster.player);
            return;
          }
        }
        var r = await fetch(API + '/api/players/' + encodeURIComponent(slug));
        var data = await r.json();
        if (!data.ok || !data.player) throw new Error(data.error || 'Player not found');
        renderRecruit(data.player, data.events);
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error').textContent = e.message || String(e);
      }
    }
    load();
  </script>
</body>
</html>
